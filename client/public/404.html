<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // Redirect 404s to index.html for client-side routing
    sessionStorage.setItem('redirect', location.href);
    location.replace(location.pathname.split('/').slice(0, 2).join('/'));
  </script>
</head>
<body>
</body>
</html>
